name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        run: make release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maat-release-artifacts
          path: |
            dist/*.tar.gz
            dist/checksums-*.txt
